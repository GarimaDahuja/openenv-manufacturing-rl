spec_version: 1
name: manufacturing_env
description: Manufacturing process optimization environment for OpenEnv
type: space
runtime: fastapi
app: manufacturing_env.server.app:app
port: 7860
action: Action
observation: State
tasks:
  - name: minimize_idle_time
    description: Keep machines busy
    grader: manufacturing_env.tasks:task_idle_time

  - name: optimize_completion_time
    description: Minimize total completion time
    grader: manufacturing_env.tasks:task_completion_time

  - name: handle_machine_failures
    description: Maintain performance despite breakdowns
    grader: manufacturing_env.tasks:task_breakdown_handling
